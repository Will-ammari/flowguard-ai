

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowguard_app
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: flowguard
      DB_USERNAME: flowguard
      DB_PASSWORD: secret
    command: >
      sh -c "composer install &&
             php artisan key:generate --force &&
             php artisan migrate --seed --force &&
             php artisan serve --host=0.0.0.0 --port=8000"

  mysql:
    image: mysql:8.0
    container_name: flowguard_mysql
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: flowguard
      MYSQL_USER: flowguard
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - flowguard_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  flowguard_mysql_data: